name: cinema-hw5

x-kafka-common: &kafka-common
  image: confluentinc/cp-kafka:7.6.1
  environment: &kafka-env
    KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
    KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
    KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
    KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 2
    KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 2
    KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
    KAFKA_MIN_INSYNC_REPLICAS: 1
    KAFKA_DEFAULT_REPLICATION_FACTOR: 2
    KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
    KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0

services:
  # -------------------- Kafka cluster --------------------
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo ruok | (exec 3<>/dev/tcp/localhost/2181; cat >&3; cat <&3)' 2>/dev/null | grep -q imok"]
      interval: 5s
      timeout: 10s
      retries: 30
      start_period: 15s

  kafka1:
    <<: *kafka-common
    hostname: kafka1
    depends_on:
      zookeeper: {condition: service_healthy}
    ports: ["9092:9092"]
    environment:
      <<: *kafka-env
      KAFKA_BROKER_ID: 1
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:29092,EXTERNAL://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka1:29092,EXTERNAL://localhost:9092
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:29092 >/dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 20

  kafka2:
    <<: *kafka-common
    hostname: kafka2
    depends_on:
      zookeeper: {condition: service_healthy}
    ports: ["9093:9093"]
    environment:
      <<: *kafka-env
      KAFKA_BROKER_ID: 2
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:29092,EXTERNAL://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka2:29092,EXTERNAL://localhost:9093
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:29092 >/dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 20

  schema-registry:
    image: confluentinc/cp-schema-registry:7.6.1
    depends_on:
      kafka1: {condition: service_healthy}
      kafka2: {condition: service_healthy}
    ports: ["8081:8081"]
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: PLAINTEXT://kafka1:29092,PLAINTEXT://kafka2:29092
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8081
      SCHEMA_REGISTRY_KAFKASTORE_TOPIC_REPLICATION_FACTOR: 2
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8081/subjects >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 20

  kafka-init:
    image: confluentinc/cp-kafka:7.6.1
    depends_on:
      kafka1: {condition: service_healthy}
      kafka2: {condition: service_healthy}
      schema-registry: {condition: service_healthy}
    volumes:
      - ./schemas:/schemas:ro
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        set -e
        echo "==> Creating topic movie-events (partitions=3, rf=2, min.isr=1)"
        kafka-topics --bootstrap-server kafka1:29092 \
          --create --if-not-exists \
          --topic movie-events \
          --partitions 3 \
          --replication-factor 2 \
          --config min.insync.replicas=1
        kafka-topics --bootstrap-server kafka1:29092 --describe --topic movie-events
    restart: "no"

  schema-init:
    image: alpine:3.19
    depends_on:
      kafka-init: {condition: service_completed_successfully}
      schema-registry: {condition: service_healthy}
    volumes:
      - ./schemas:/schemas:ro
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -e
        apk add --no-cache curl jq >/dev/null
        echo "==> Registering Avro schema for movie-events-value"
        BODY=$$(jq -Rs '{schemaType:"AVRO", schema: .}' < /schemas/movie_event.avsc)
        curl -fsS -X POST \
          -H "Content-Type: application/vnd.schemaregistry.v1+json" \
          --data "$$BODY" \
          http://schema-registry:8081/subjects/movie-events-value/versions
        echo ""
        echo "==> Registered versions:"
        curl -fsS http://schema-registry:8081/subjects/movie-events-value/versions
        echo ""
    restart: "no"

  # -------------------- Storage --------------------
  clickhouse:
    image: clickhouse/clickhouse-server:24.3
    depends_on:
      kafka-init: {condition: service_completed_successfully}
      schema-init: {condition: service_completed_successfully}
    ports:
      - "8123:8123"
      - "9000:9000"
    ulimits:
      nofile: {soft: 262144, hard: 262144}
    volumes:
      - ./clickhouse/init:/docker-entrypoint-initdb.d:ro
      - ./clickhouse/config.d:/etc/clickhouse-server/config.d:ro
      - ch_data:/var/lib/clickhouse
    environment:
      CLICKHOUSE_DB: cinema
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: ""
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8123/ping | grep -q Ok"]
      interval: 10s
      timeout: 5s
      retries: 30

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: analytics
      POSTGRES_USER: analytics
      POSTGRES_PASSWORD: analytics
    ports: ["5432:5432"]
    volumes:
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U analytics -d analytics"]
      interval: 5s
      timeout: 5s
      retries: 20

  minio:
    image: minio/minio:RELEASE.2024-09-13T20-26-02Z
    command: server /data --console-address ":9001"
    ports:
      - "9100:9000"
      - "9101:9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio12345
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 20

  minio-init:
    image: minio/mc:RELEASE.2024-09-09T07-53-10Z
    depends_on:
      minio: {condition: service_healthy}
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        mc alias set local http://minio:9000 minio minio12345 &&
        mc mb --ignore-existing local/movie-analytics &&
        mc ls local/
    restart: "no"

  # -------------------- Application services --------------------
  producer:
    build:
      context: .
      dockerfile: producer/Dockerfile
    depends_on:
      kafka-init: {condition: service_completed_successfully}
      schema-init: {condition: service_completed_successfully}
    ports: ["8000:8000"]
    environment:
      KAFKA_BOOTSTRAP: kafka1:29092,kafka2:29092
      SCHEMA_REGISTRY_URL: http://schema-registry:8081
      TOPIC: movie-events
      GENERATOR_ENABLED: "true"
      GENERATOR_EPS: "20"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/health | grep -q ok"]
      interval: 10s
      timeout: 5s
      retries: 20

  aggregator:
    build:
      context: .
      dockerfile: aggregator/Dockerfile
    depends_on:
      clickhouse: {condition: service_healthy}
      postgres: {condition: service_healthy}
      minio-init: {condition: service_completed_successfully}
    ports: ["8010:8010"]
    environment:
      CLICKHOUSE_HOST: clickhouse
      CLICKHOUSE_PORT: "8123"
      CLICKHOUSE_DB: cinema
      PG_DSN: postgresql://analytics:analytics@postgres:5432/analytics
      AGGREGATION_CRON: "*/2 * * * *"
      EXPORT_CRON: "5 0 * * *"
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: minio
      S3_SECRET_KEY: minio12345
      S3_BUCKET: movie-analytics
      S3_PREFIX: daily
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8010/health | grep -q ok"]
      interval: 10s
      timeout: 5s
      retries: 20

  grafana:
    image: grafana/grafana:11.2.0
    depends_on:
      clickhouse: {condition: service_healthy}
    ports: ["3000:3000"]
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      GF_INSTALL_PLUGINS: grafana-clickhouse-datasource
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:3000/api/health | grep -q ok"]
      interval: 10s
      timeout: 5s
      retries: 30

volumes:
  ch_data:
  pg_data:
  minio_data:
